{% extends "base.html" %}
{% block content %}

<div class="page-wrapper">
    <!-- Header Section -->
    <div class="header-section">
        <button class="btn-back" onclick="history.back()">
            <span class="back-icon">←</span> بازگشت
        </button>
        <h1 class="page-title">مدیریت محصولات</h1>
    </div>

    <div class="container">
        <!-- Card Header -->
        <div class="card-header">
            <div class="header-left">
                <h2 class="section-title">
                    <span class="icon-grid">⊞</span> Product Table
                </h2>
                <span class="badge-count" id="productCount">0 products</span>
            </div>
            <div class="header-right" style="display: flex; gap: 10px;">
                <button class="btn-add-category" onclick="openAddCategoryModal()">
                    <span class="btn-icon">📂</span> افزودن دسته جدید
                </button>
                <button class="btn-add-subcategory" onclick="openAddSubcategoryModal()">
                    <span class="btn-icon">📁</span> افزودن زیردسته جدید
                </button>
                <button class="btn-add-product" onclick="openAddProductModal()">
                    <span class="btn-icon">+</span> افزودن محصول جدید
                </button>
            </div>
        </div>

        <!-- Search & Filters -->
        <div class="filters-panel">
            <div class="search-box">
                <span class="search-icon">🔍</span>
                <input id="searchInput" type="text" placeholder="جستجو بر اساس نام محصول..." />
                <button class="btn-clear-search" id="clearSearch" style="display:none;">✕</button>
            </div>

            <div class="dropdown-filters">
                <!-- Factory -->
                <div class="dropdown">
                    <button class="dropbtn">
                        <span class="filter-icon">🏭</span> کارخانه <span class="arrow">▾</span>
                        <span class="filter-count" id="factoryCount"></span>
                    </button>
                    <div class="dropdown-content" id="factoryDropdown"></div>
                </div>

                <!-- Category -->
                <div class="dropdown">
                    <button class="dropbtn">
                        <span class="filter-icon">📂</span> دسته <span class="arrow">▾</span>
                        <span class="filter-count" id="categoryCount"></span>
                    </button>
                    <div class="dropdown-content" id="categoryDropdown"></div>
                </div>

                <!-- Subcategory -->
                <div class="dropdown">
                    <button class="dropbtn">
                        <span class="filter-icon">📁</span> زیردسته <span class="arrow">▾</span>
                        <span class="filter-count" id="subcategoryCount"></span>
                    </button>
                    <div class="dropdown-content" id="subcategoryDropdown"></div>
                </div>
            </div>

            <!-- Active Filters -->
            <div class="active-filters" id="activeFilters"></div>
        </div>

        <!-- Table -->
        <div class="table-wrapper">
            <table id="productTable">
                <thead>
                    <tr>
                        <th width="5%">#</th>
                        <th width="20%">نام محصول</th>
                        <th width="15%">کارخانه</th>
                        <th width="15%">دسته</th>
                        <th width="15%">زیردسته</th>
                        <th width="15%">ظرفیت (Ah)</th>
                        <th width="15%">عملیات</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
            <div class="empty-state" id="emptyState" style="display:none;">
                <div class="empty-icon">📦</div>
                <h3>محصولی یافت نشد</h3>
                <p>معیارهای جستجو یا فیلتر را تغییر دهید</p>
            </div>
        </div>

        <!-- Pagination -->
        <div class="pagination-wrapper">
            <div class="pagination-info">
                نمایش <span id="showingStart">0</span>-<span id="showingEnd">0</span> از <span id="totalResults">0</span> نتیجه
            </div>
            <div class="pagination">
                <button id="prevPage" class="btn-page">قبلی</button>
                <div class="page-numbers" id="pageNumbers"></div>
                <button id="nextPage" class="btn-page">بعدی</button>
            </div>
        </div>
    </div>
</div>

<!-- Add Product Modal -->
<div class="modal-overlay" id="addProductModal">
    <div class="modal-dialog">
        <div class="modal-header">
            <h3>افزودن محصول جدید</h3>
            <button class="btn-close-modal" onclick="closeAddProductModal()">✕</button>
        </div>
        <div class="modal-body">
            <form id="addProductForm">
                <div class="form-group">
                    <label for="newProductName">نام محصول *</label>
                    <input type="text" id="newProductName" required placeholder="نام محصول را وارد کنید" autofocus>
                </div>
                <div class="form-group">
                    <label for="newFactory">کارخانه *</label>
                    <select id="newFactory" required></select>
                </div>
                <div class="form-group">
                    <label for="newCategory">دسته *</label>
                    <select id="newCategory" required disabled>
                        <option value="">ابتدا کارخانه را انتخاب کنید</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newSubcategory">زیردسته *</label>
                    <select id="newSubcategory" required disabled>
                        <option value="">ابتدا دسته را انتخاب کنید</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newCapacity">ظرفیت *</label>
                    <input type="number" id="newCapacity" required min="1" max="1000" value="50" placeholder="ظرفیت را وارد کنید">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeAddProductModal()">انصراف</button>
                    <button type="submit" class="btn-save">ذخیره محصول</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Add Category Modal -->
<div class="modal-overlay" id="addCategoryModal">
    <div class="modal-dialog">
        <div class="modal-header">
            <h3>افزودن دسته جدید</h3>
            <button class="btn-close-modal" onclick="closeAddCategoryModal()">✕</button>
        </div>
        <div class="modal-body">
            <form id="addCategoryForm">
                <div class="form-group">
                    <label for="newCategoryFactory">کارخانه *</label>
                    <select id="newCategoryFactory" required>
                        <option value="">انتخاب کارخانه</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newCategoryName">نام دسته *</label>
                    <input type="text" id="newCategoryName" required placeholder="نام دسته را وارد کنید">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeAddCategoryModal()">انصراف</button>
                    <button type="submit" class="btn-save">ذخیره دسته</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Add Subcategory Modal -->
<div class="modal-overlay" id="addSubcategoryModal">
    <div class="modal-dialog">
        <div class="modal-header">
            <h3>افزودن زیردسته جدید</h3>
            <button class="btn-close-modal" onclick="closeAddSubcategoryModal()">✕</button>
        </div>
        <div class="modal-body">
            <form id="addSubcategoryForm">
                <div class="form-group">
                    <label for="newSubcategoryFactory">کارخانه *</label>
                    <select id="newSubcategoryFactory" required>
                        <option value="">انتخاب کارخانه</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newSubcategoryCategory">دسته *</label>
                    <select id="newSubcategoryCategory" required>
                        <option value="">انتخاب دسته</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="newSubcategoryName">نام زیردسته *</label>
                    <input type="text" id="newSubcategoryName" required placeholder="نام زیردسته را وارد کنید">
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeAddSubcategoryModal()">انصراف</button>
                    <button type="submit" class="btn-save">ذخیره زیردسته</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Persistent Notification (outside modal) -->
<div id="persistentNotification" class="notification persistent-notification" style="display:none;">
    <span id="notifMessage"></span>
    <button class="notif-close-btn" onclick="closePersistentNotification()">✕</button>
</div>

<script>
// JSON data passed from Flask
const rawData = {{ table_json | safe }};

// Convert JSON columns → row objects
function jsonToRowData(jsonObj) {
    const keys = Object.keys(jsonObj);
    const rows = [];
    const len = Object.values(jsonObj[keys[0]]).length;

    for (let i = 0; i < len; i++) {
        let row = {};
        keys.forEach(k => row[k] = jsonObj[k][i]);
        rows.push(row);
    }
    return rows;
}

const tableData = jsonToRowData(rawData);

// Pagination
let currentPage = 1;
const rowsPerPage = 10;

// DOM references
const tbody = document.querySelector("#productTable tbody");
const searchInput = document.getElementById("searchInput");
const prevBtn = document.getElementById("prevPage");
const nextBtn = document.getElementById("nextPage");
const clearSearchBtn = document.getElementById("clearSearch");
const emptyState = document.getElementById("emptyState");
const productCount = document.getElementById("productCount");

// Filter state
let filters = {
    Factory: [],
    Category: [],
    Subcategory: []
};

// Hierarchy data
let productHierarchy = {};
let factories = [];
let categories = [];
let subcategories = [];

// ==============================
// LOAD BACKEND OPTIONS
// ==============================

async function loadProductOptions() {
    try {
        const resp = await fetch("/api/product_options");
        const data = await resp.json();
        
        // Store the hierarchy
        productHierarchy = data.product_hierarchy || {};
        factories = data.factories || [];
        categories = data.categories || [];
        subcategories = data.subcategories || [];
        
        // Populate all dropdowns
        populateDropdown("newFactory", factories);
        populateDropdown("newCategoryFactory", factories);
        populateDropdown("newSubcategoryFactory", factories);
        
        // Initialize category dropdowns based on selected factory
        initializeDynamicDropdowns();
        
    } catch (error) {
        console.error("Failed to load product options:", error);
    }
}

function populateDropdown(id, options) {
    const select = document.getElementById(id);
    if (!select) return;
    
    select.innerHTML = '<option value="">Select</option>';
    if (!options || options.length === 0) {
        return;
    }
    options.forEach(opt => {
        const el = document.createElement("option");
        el.value = opt;
        el.textContent = opt;
        select.appendChild(el);
    });
}

// ==============================
// DYNAMIC CATEGORY LOADING FOR ADD PRODUCT MODAL
// USING product_hierarchy
// ==============================

function initializeDynamicDropdowns() {
    // Setup factory change listener for add product modal
    const newFactory = document.getElementById("newFactory");
    if (newFactory) {
        newFactory.addEventListener("change", function() {
            const factory = this.value;
            const categorySelect = document.getElementById("newCategory");
            const subcategorySelect = document.getElementById("newSubcategory");
            
            if (!factory) {
                categorySelect.innerHTML = '<option value="">ابتدا کارخانه را انتخاب کنید</option>';
                categorySelect.disabled = true;
                subcategorySelect.innerHTML = '<option value="">ابتدا دسته را انتخاب کنید</option>';
                subcategorySelect.disabled = true;
                return;
            }
            
            // Get categories for this factory from product_hierarchy
            const factoryData = productHierarchy[factory];
            if (factoryData && Object.keys(factoryData).length > 0) {
                const matchingCategories = Object.keys(factoryData).sort();
                
                categorySelect.innerHTML = '<option value="">انتخاب دسته</option>';
                matchingCategories.forEach(cat => {
                    const el = document.createElement("option");
                    el.value = cat;
                    el.textContent = cat;
                    categorySelect.appendChild(el);
                });
                categorySelect.disabled = false;
                
                // Reset subcategory dropdown
                subcategorySelect.innerHTML = '<option value="">ابتدا دسته را انتخاب کنید</option>';
                subcategorySelect.disabled = true;
            } else {
                categorySelect.innerHTML = '<option value="">دسته‌ای موجود نیست</option>';
                categorySelect.disabled = true;
                subcategorySelect.innerHTML = '<option value="">ابتدا دسته را انتخاب کنید</option>';
                subcategorySelect.disabled = true;
                showPersistentNotification(`Please first define a category for factory "${factory}"`, "error");
            }
        });
    }
    
    // Setup category change listener for add product modal
    const newCategory = document.getElementById("newCategory");
    if (newCategory) {
        newCategory.addEventListener("change", function() {
            const category = this.value;
            const factory = document.getElementById("newFactory").value;
            const subcategorySelect = document.getElementById("newSubcategory");
            
            if (!category || !factory) {
                subcategorySelect.innerHTML = '<option value="">ابتدا دسته را انتخاب کنید</option>';
                subcategorySelect.disabled = true;
                return;
            }
            
            // Get subcategories for this category from product_hierarchy
            const factoryData = productHierarchy[factory];
            if (factoryData && factoryData[category]) {
                const matchingSubcategories = factoryData[category];
                
                if (matchingSubcategories && matchingSubcategories.length > 0) {
                    subcategorySelect.innerHTML = '<option value="">انتخاب زیردسته</option>';
                    matchingSubcategories.sort().forEach(subcat => {
                        const el = document.createElement("option");
                        el.value = subcat;
                        el.textContent = subcat;
                        subcategorySelect.appendChild(el);
                    });
                    subcategorySelect.disabled = false;
                } else {
                    subcategorySelect.innerHTML = '<option value="">زیردسته‌ای موجود نیست</option>';
                    subcategorySelect.disabled = true;
                    showPersistentNotification(`Please first define a subcategory for category "${category}" in factory "${factory}"`, "error");
                }
            } else {
                subcategorySelect.innerHTML = '<option value="">زیردسته‌ای موجود نیست</option>';
                subcategorySelect.disabled = true;
                showPersistentNotification(`Please first define a subcategory for category "${category}" in factory "${factory}"`, "error");
            }
        });
    }
    
    // Setup factory change listener for add subcategory modal
    const newSubcategoryFactory = document.getElementById("newSubcategoryFactory");
    if (newSubcategoryFactory) {
        newSubcategoryFactory.addEventListener("change", function() {
            const factory = this.value;
            const categorySelect = document.getElementById("newSubcategoryCategory");
            
            if (!factory) {
                categorySelect.innerHTML = '<option value="">انتخاب دسته</option>';
                categorySelect.disabled = false;
                return;
            }
            
            // Get categories for this factory from product_hierarchy
            const factoryData = productHierarchy[factory];
            if (factoryData && Object.keys(factoryData).length > 0) {
                const matchingCategories = Object.keys(factoryData).sort();
                
                categorySelect.innerHTML = '<option value="">انتخاب دسته</option>';
                matchingCategories.forEach(cat => {
                    const el = document.createElement("option");
                    el.value = cat;
                    el.textContent = cat;
                    categorySelect.appendChild(el);
                });
                categorySelect.disabled = false;
            } else {
                categorySelect.innerHTML = '<option value="">دسته‌ای موجود نیست</option>';
                categorySelect.disabled = true;
                showPersistentNotification(`Please first define a category for factory "${factory}"`, "error");
            }
        });
    }
}

// ==============================
// ADD PRODUCT LOGIC
// ==============================

function openAddProductModal() {
    const modal = document.getElementById("addProductModal");
    modal.classList.add("active");
    // Reset the form and dropdowns
    document.getElementById("addProductForm").reset();
    document.getElementById("newCategory").innerHTML = '<option value="">ابتدا کارخانه را انتخاب کنید</option>';
    document.getElementById("newCategory").disabled = true;
    document.getElementById("newSubcategory").innerHTML = '<option value="">ابتدا دسته را انتخاب کنید</option>';
    document.getElementById("newSubcategory").disabled = true;
    document.getElementById("newCapacity").value = '50';
    setTimeout(() => {
        document.getElementById("newProductName").focus();
    }, 100);
}

function closeAddProductModal() {
    document.getElementById("addProductModal").classList.remove("active");
    document.getElementById("addProductForm").reset();
}

document.getElementById("addProductModal").addEventListener("click", function(e) {
    if (e.target === this) {
        closeAddProductModal();
    }
});

document.querySelectorAll(".modal-dialog").forEach(dialog => {
    dialog.addEventListener("click", function(e) {
        e.stopPropagation();
    });
});

document.getElementById("addProductForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    
    const productName = document.getElementById("newProductName").value.trim();
    const factory = document.getElementById("newFactory").value;
    const category = document.getElementById("newCategory").value;
    const subcategory = document.getElementById("newSubcategory").value;
    const capacityValue = document.getElementById("newCapacity").value.trim();
    const capacity = parseInt(capacityValue);
    
    if (!productName || !factory || !category || !subcategory || !capacityValue) {
        showPersistentNotification("All fields are required.", "error");
        return;
    }
    
    // Validate capacity is a positive integer
    if (isNaN(capacity) || capacity < 1 || !Number.isInteger(capacity)) {
        showPersistentNotification("Capacity must be a positive integer (e.g., 1, 2, 50, 100).", "error");
        return;
    }
    
    // Validate that the category belongs to the factory using product_hierarchy
    const factoryData = productHierarchy[factory];
    if (!factoryData || !factoryData[category]) {
        showPersistentNotification(`Invalid category "${category}" for factory "${factory}". Please select a valid category.`, "error");
        return;
    }
    
    // Validate that the subcategory belongs to the category
    if (!factoryData[category].includes(subcategory)) {
        showPersistentNotification(`Invalid subcategory "${subcategory}" for category "${category}". Please select a valid subcategory.`, "error");
        return;
    }
    
    const payload = {
        product_name: productName,
        factory: factory,
        category: category,
        subcategory: subcategory,
        capacity: capacity
    };
    
    try {
        const resp = await fetch("/add_product", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
        });
        const result = await resp.json();
        
        if (result.status === "ok") {
            tableData.push({
                Product_Name: productName,
                Factory: factory,
                Category: category,
                Subcategory: subcategory,
                Capacity: capacity
            });
            
            refreshAllDropdowns();
            closeAddProductModal();
            renderTable();
            showPersistentNotification("Product added successfully!", "success");
        } else {
            showPersistentNotification("Error: " + (result.message || "Unknown error"), "error");
        }
    } catch (error) {
        showPersistentNotification("Network error. Please try again.", "error");
    }
});

// ==============================
// ADD CATEGORY LOGIC
// ==============================

function openAddCategoryModal() {
    const modal = document.getElementById("addCategoryModal");
    modal.classList.add("active");
    setTimeout(() => {
        document.getElementById("newCategoryName").focus();
    }, 100);
}

function closeAddCategoryModal() {
    document.getElementById("addCategoryModal").classList.remove("active");
    document.getElementById("addCategoryForm").reset();
}

document.getElementById("addCategoryModal").addEventListener("click", function(e) {
    if (e.target === this) {
        closeAddCategoryModal();
    }
});

document.getElementById("addCategoryForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    
    const factory = document.getElementById("newCategoryFactory").value;
    const categoryName = document.getElementById("newCategoryName").value.trim();
    
    if (!factory || !categoryName) {
        showPersistentNotification("All fields are required.", "error");
        return;
    }
    
    try {
        const resp = await fetch("/add_category", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ factory: factory, category_name: categoryName })
        });
        const result = await resp.json();
        
        if (result.status === "ok") {
            // Update local product_hierarchy
            if (!productHierarchy[factory]) {
                productHierarchy[factory] = {};
            }
            productHierarchy[factory][categoryName] = [];
            
            // Reload all options and refresh UI
            await loadProductOptions();
            refreshAllDropdowns();
            closeAddCategoryModal();
            showPersistentNotification("Category added successfully!", "success");
        } else {
            showPersistentNotification("Error: " + (result.message || "Unknown error"), "error");
        }
    } catch (error) {
        showPersistentNotification("Network error. Please try again.", "error");
    }
});

// ==============================
// ADD SUBCATEGORY LOGIC
// ==============================

function openAddSubcategoryModal() {
    const modal = document.getElementById("addSubcategoryModal");
    modal.classList.add("active");
    // Reset the category dropdown
    document.getElementById("newSubcategoryCategory").innerHTML = '<option value="">انتخاب دسته</option>';
    document.getElementById("newSubcategoryCategory").disabled = false;
    setTimeout(() => {
        document.getElementById("newSubcategoryName").focus();
    }, 100);
}

function closeAddSubcategoryModal() {
    document.getElementById("addSubcategoryModal").classList.remove("active");
    document.getElementById("addSubcategoryForm").reset();
    document.getElementById("newSubcategoryCategory").disabled = false;
}

document.getElementById("addSubcategoryModal").addEventListener("click", function(e) {
    if (e.target === this) {
        closeAddSubcategoryModal();
    }
});

document.getElementById("addSubcategoryForm").addEventListener("submit", async function(e) {
    e.preventDefault();
    
    const factory = document.getElementById("newSubcategoryFactory").value;
    const category = document.getElementById("newSubcategoryCategory").value;
    const subcategoryName = document.getElementById("newSubcategoryName").value.trim();
    
    if (!factory || !category || !subcategoryName) {
        showPersistentNotification("All fields are required.", "error");
        return;
    }
    
    // Check if the category is valid for the factory using product_hierarchy
    const factoryData = productHierarchy[factory];
    if (!factoryData || !factoryData[category]) {
        showPersistentNotification(`Invalid category "${category}" for factory "${factory}". Please select a valid category.`, "error");
        return;
    }
    
    try {
        const resp = await fetch("/add_subcategory", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ 
                factory: factory, 
                category: category, 
                subcategory_name: subcategoryName 
            })
        });
        const result = await resp.json();
        
        if (result.status === "ok") {
            // Update local product_hierarchy
            if (productHierarchy[factory] && productHierarchy[factory][category]) {
                if (!productHierarchy[factory][category].includes(subcategoryName)) {
                    productHierarchy[factory][category].push(subcategoryName);
                    productHierarchy[factory][category].sort();
                }
            }
            
            // Reload all options and refresh UI
            await loadProductOptions();
            refreshAllDropdowns();
            closeAddSubcategoryModal();
            showPersistentNotification("Subcategory added successfully!", "success");
        } else {
            showPersistentNotification("Error: " + (result.message || "Unknown error"), "error");
        }
    } catch (error) {
        showPersistentNotification("Network error. Please try again.", "error");
    }
});

// ==============================
// FILTERS, TABLE RENDERING, ETC.
// ==============================

// Utility to create dropdown checkboxes
function buildDropdown(id, columnName) {
    const container = document.getElementById(id);
    if (!container) return;
    
    const uniqueVals = [...new Set(tableData.map(x => x[columnName]))].sort();

    // "All" option
    const allDiv = document.createElement("div");
    allDiv.className = "dropdown-item";
    allDiv.innerHTML = `
        <label class="checkbox-label">
            <input type="checkbox" class="filter-checkbox" 
                   data-column="${columnName}" 
                   data-value="__all__"
                   checked>
            <span class="checkmark"></span>
            All
        </label>
    `;
    container.appendChild(allDiv);

    // Individual values
    uniqueVals.forEach(val => {
        const div = document.createElement("div");
        div.className = "dropdown-item";
        div.innerHTML = `
            <label class="checkbox-label">
                <input type="checkbox" class="filter-checkbox" 
                       data-column="${columnName}" 
                       data-value="${val}">
                <span class="checkmark"></span>
                ${val}
            </label>
        `;
        container.appendChild(div);
    });
}

// Handle filter logic
document.addEventListener("change", e => {
    if (!e.target.classList.contains("filter-checkbox")) return;

    const col = e.target.dataset.column;
    const val = e.target.dataset.value;

    if (val === "__all__") {
        filters[col] = [];
        const checkboxes = document.querySelectorAll(`input[data-column="${col}"]`);
        checkboxes.forEach(cb => cb.checked = (cb.dataset.value === "__all__"));
    } else {
        const allBox = document.querySelector(`input[data-column="${col}"][data-value="__all__"]`);
        allBox.checked = false;

        if (filters[col].includes(val)) {
            filters[col] = filters[col].filter(v => v !== val);
        } else {
            filters[col].push(val);
        }

        if (filters[col].length === 0) {
            allBox.checked = true;
        }
    }

    updateFilterCounts();
    updateActiveFilters();
    currentPage = 1;
    renderTable();
});

// Update filter count badges
function updateFilterCounts() {
    for (let col of ["Factory", "Category", "Subcategory"]) {
        const countEl = document.getElementById(col.toLowerCase() + "Count");
        if (countEl) {
            if (filters[col].length > 0) {
                countEl.textContent = filters[col].length;
                countEl.style.display = "inline";
            } else {
                countEl.style.display = "none";
            }
        }
    }
}

// Show active filters as tags
function updateActiveFilters() {
    const container = document.getElementById("activeFilters");
    if (!container) return;
    
    let html = "";
    
    for (let col of ["Factory", "Category", "Subcategory"]) {
        filters[col].forEach(val => {
            html += `
                <span class="filter-tag">
                    ${col}: ${val}
                    <span class="remove-filter" onclick="removeFilter('${col}', '${val}')">✕</span>
                </span>
            `;
        });
    }
    
    container.innerHTML = html;
}

// Remove individual filter
function removeFilter(col, val) {
    filters[col] = filters[col].filter(v => v !== val);
    if (filters[col].length === 0) {
        const allBox = document.querySelector(`input[data-column="${col}"][data-value="__all__"]`);
        if (allBox) allBox.checked = true;
    }
    
    // Update checkbox states
    const checkboxes = document.querySelectorAll(`input[data-column="${col}"]`);
    checkboxes.forEach(cb => {
        if (cb.dataset.value !== "__all__") {
            cb.checked = filters[col].includes(cb.dataset.value);
        }
    });
    
    updateFilterCounts();
    updateActiveFilters();
    currentPage = 1;
    renderTable();
}

// Filtering logic
function getFilteredData() {
    const text = searchInput.value.toLowerCase();

    return tableData.filter(row => {
        if (text && !row.Product_Name.toLowerCase().includes(text)) return false;

        for (let col of ["Factory", "Category", "Subcategory"]) {
            const active = filters[col];
            if (active.length === 0) continue;
            if (!active.includes(row[col])) return false;
        }

        return true;
    });
}

// Render table with pagination
function renderTable() {
    const filtered = getFilteredData();
    const totalPages = Math.ceil(filtered.length / rowsPerPage);
    
    // Update product count
    if (productCount) {
        productCount.textContent = `${filtered.length} product${filtered.length !== 1 ? 's' : ''}`;
    }

    // Handle empty state
    const table = document.getElementById("productTable");
    if (table) {
        if (filtered.length === 0) {
            table.style.display = "none";
            if (emptyState) emptyState.style.display = "block";
        } else {
            table.style.display = "table";
            if (emptyState) emptyState.style.display = "none";
        }
    }

    const start = (currentPage - 1) * rowsPerPage;
    const end = Math.min(start + rowsPerPage, filtered.length);
    const pageRows = filtered.slice(start, end);

    if (tbody) {
        tbody.innerHTML = "";

        pageRows.forEach((row, index) => {
            const globalIndex = start + index + 1;
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td>${globalIndex}</td>
                <td class="product-name">${escapeHtml(String(row.Product_Name))}</td>
                <td>${escapeHtml(String(row.Factory))}</td>
                <td>${escapeHtml(String(row.Category))}</td>
                <td>${escapeHtml(String(row.Subcategory))}</td>
                <td>${escapeHtml(String(row.Capacity || ''))}</td>
                <td>
                    <form method="POST" action="/product/${encodeURIComponent(row.Product_Name)}" style="margin:0;">
                        <input type="hidden" name="factory" value="${escapeHtml(String(row.Factory))}">
                        <input type="hidden" name="category" value="${escapeHtml(String(row.Category))}">
                        <input type="hidden" name="subcategory" value="${escapeHtml(String(row.Subcategory))}">
                        <button type="submit" class="btn-view">View</button>
                    </form>
                </td>
            `;

            tbody.appendChild(tr);
        });
    }

    // Update showing info
    const showingStart = document.getElementById("showingStart");
    const showingEnd = document.getElementById("showingEnd");
    const totalResults = document.getElementById("totalResults");
    
    if (showingStart) showingStart.textContent = filtered.length > 0 ? start + 1 : 0;
    if (showingEnd) showingEnd.textContent = end;
    if (totalResults) totalResults.textContent = filtered.length;

    // Update pagination
    updatePaginationControls(totalPages);
    
    // Update search clear button
    if (clearSearchBtn) {
        clearSearchBtn.style.display = searchInput.value ? "inline-block" : "none";
    }
}

// Update pagination controls
function updatePaginationControls(totalPages) {
    if (prevBtn) prevBtn.disabled = currentPage === 1;
    if (nextBtn) nextBtn.disabled = currentPage === totalPages || totalPages === 0;
    
    // Generate page numbers
    const pageNumbersContainer = document.getElementById("pageNumbers");
    if (!pageNumbersContainer) return;
    
    let pageNumbersHtml = "";
    
    for (let i = 1; i <= totalPages; i++) {
        if (i === currentPage) {
            pageNumbersHtml += `<span class="page-number active">${i}</span>`;
        } else {
            pageNumbersHtml += `<span class="page-number" onclick="goToPage(${i})">${i}</span>`;
        }
    }
    
    pageNumbersContainer.innerHTML = pageNumbersHtml;
}

// Go to specific page
function goToPage(page) {
    currentPage = page;
    renderTable();
    const tableWrapper = document.querySelector(".table-wrapper");
    if (tableWrapper) tableWrapper.scrollIntoView({ behavior: "smooth" });
}

// Pagination controls
if (prevBtn) {
    prevBtn.onclick = () => {
        if (currentPage > 1) {
            currentPage--;
            renderTable();
        }
    };
}
if (nextBtn) {
    nextBtn.onclick = () => {
        const total = Math.ceil(getFilteredData().length / rowsPerPage);
        if (currentPage < total) {
            currentPage++;
            renderTable();
        }
    };
}

// Live search
if (searchInput) {
    searchInput.addEventListener("input", () => {
        currentPage = 1;
        renderTable();
    });
}

// Clear search
if (clearSearchBtn) {
    clearSearchBtn.addEventListener("click", () => {
        if (searchInput) {
            searchInput.value = "";
            currentPage = 1;
            renderTable();
            searchInput.focus();
        }
    });
}

function refreshAllDropdowns() {
    const dropdowns = ["factoryDropdown", "categoryDropdown", "subcategoryDropdown"];
    dropdowns.forEach(id => {
        const container = document.getElementById(id);
        if (container) container.innerHTML = "";
    });
    buildDropdown("factoryDropdown", "Factory");
    buildDropdown("categoryDropdown", "Category");
    buildDropdown("subcategoryDropdown", "Subcategory");
}

function showPersistentNotification(message, type = "success") {
    const notif = document.getElementById("persistentNotification");
    const msgEl = document.getElementById("notifMessage");
    if (!notif || !msgEl) return;
    
    msgEl.textContent = message;
    notif.className = `notification persistent-notification notification-${type}`;
    notif.style.display = "block";
    
    setTimeout(() => {
        if (notif.style.display === "block") {
            notif.style.display = "none";
        }
    }, 5000);
}

function closePersistentNotification() {
    const notif = document.getElementById("persistentNotification");
    if (notif) notif.style.display = "none";
}

function escapeHtml(str) {
    if (str === null || str === undefined) return '';
    str = String(str);
    return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
    });
}

// Close modals with Escape key
document.addEventListener("keydown", function(e) {
    if (e.key === "Escape") {
        const modals = ["addProductModal", "addCategoryModal", "addSubcategoryModal"];
        modals.forEach(modalId => {
            const modal = document.getElementById(modalId);
            if (modal && modal.classList.contains("active")) {
                if (modalId === "addProductModal") closeAddProductModal();
                if (modalId === "addCategoryModal") closeAddCategoryModal();
                if (modalId === "addSubcategoryModal") closeAddSubcategoryModal();
            }
        });
    }
});

// Load dropdown options on page start
loadProductOptions();

// Initialize dropdowns after table data is ready
setTimeout(() => {
    buildDropdown("factoryDropdown", "Factory");
    buildDropdown("categoryDropdown", "Category");
    buildDropdown("subcategoryDropdown", "Subcategory");
}, 100);

// Init render
renderTable();
</script>
