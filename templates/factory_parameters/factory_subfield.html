{% extends "base.html" %}

{% block content %}

<div class="page-container">
    <button class="btn btn-secondary mb-3" onclick="history.back()">
        ← Back
    </button>

    <!-- Subfield Header -->
    <div class="header-section">
        <div class="title-badge">
            <span class="badge-icon">📂</span>
            <div>
                <h2>{{Subfield}}</h2>
                <p class="subtitle">Subfield parameter management and configuration</p>
            </div>
        </div>
    </div>

    <!-- Search and Filters -->
    <div class="search-section">
        <div class="search-container">
            <span class="search-icon">🔍</span>
            <input id="searchInput" type="text" placeholder="Search..." class="search-input">
        </div>
        <div id="filtersContainer" class="dropdown-filters"></div>
    </div>

    <!-- Data Table Section -->
    <div class="table-section">
        <div class="section-header">
            <div class="section-title">
                <span class="section-icon">📊</span>
                <h3>Subfield Data</h3>
            </div>
            <p class="section-description">Manage parameters and values for this subfield</p>
        </div>

        <div class="table-wrapper">
            <table id="dataTable">
                <thead>
                    <tr id="tableHeader"></tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>

        <div class="button-bar">
            <button class="btn btn-add" id="addColumnBtn">
                <span class="btn-icon">➕</span> Add Column
            </button>
            <button class="btn btn-add" id="addRowBtn">
                <span class="btn-icon">📝</span> Add Row
            </button>
            <button class="btn btn-save" id="saveBtn">
                <span class="btn-icon">💾</span> Save Changes
            </button>
        </div>
    </div>
</div>

<!-- Add Row Modal -->
<div class="modal-overlay" id="addRowModal">
    <div class="modal-dialog">
        <div class="modal-header">
            <h3>Add New Row</h3>
            <button class="btn-close-modal" onclick="closeAddRowModal()">✕</button>
        </div>
        <div class="modal-body">
            <form id="addRowForm">
                <div id="modalFieldsContainer" class="modal-fields-container"></div>
                <div class="form-actions">
                    <button type="button" class="btn-cancel" onclick="closeAddRowModal()">Cancel</button>
                    <button type="submit" class="btn-save">Add Row</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>

// ===== DATA FROM FLASK =====
const tableJSON = {{ table_json | safe }};

// headers follow _order exactly
let headers = [...tableJSON._order];

// Column icons mapping
const columnIcons = {
    'subject': '📋',
    'cost': '💰',
    'delete': '🗑️',
    'view': '👁️'
};

// Convert column data -> row objects
function buildRows(){
    const rows = [];
    const data = tableJSON.data;
    const rowCount = data[headers[0]].length;

    for(let i=0;i<rowCount;i++){
        const row = {};
        headers.forEach(h=>{
            row[h] = data[h][i];
        });
        rows.push(row);
    }
    return rows;
}

let rows = buildRows();
const searchColumn = headers[1] || headers[0];

// ===== FILTER STATE =====
let filters = {};
headers.slice(1).forEach(c => filters[c] = []);

// ===== DOM =====
const tbody = document.querySelector("#dataTable tbody");
const thead = document.getElementById("tableHeader");
const filterBox = document.getElementById("filtersContainer");

function getColumnIcon(columnName) {
    const lowerName = columnName.toLowerCase();
    return columnIcons[lowerName] || '📋';
}

function getDisplayName(columnName) {
    const lowerName = columnName.toLowerCase();
    if (lowerName === 'subject') return 'Subject';
    if (lowerName === 'cost') return 'Cost';
    return columnName.charAt(0).toUpperCase() + columnName.slice(1);
}

function formatCurrency(value) {
    const num = parseFloat(value);
    if (isNaN(num)) return value;
    return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency: 'USD',
        minimumFractionDigits: 2
    }).format(num);
}

// ===== BUILD TABLE =====
function buildTable(){
    thead.innerHTML = "";
    tbody.innerHTML = "";

    // headers
    headers.forEach((h,i)=>{
        const th = document.createElement("th");
        const icon = getColumnIcon(h);
        const displayName = getDisplayName(h);
        
        const headerContent = document.createElement("div");
        headerContent.className = "header-content";
        
        const titleSpan = document.createElement("span");
        titleSpan.className = "header-title";
        
        // disable header editing for subject and cost columns
        if([0, 1].includes(i)){
            titleSpan.contentEditable = false;
            titleSpan.innerHTML = `${icon} ${displayName}`;
        } else {
            titleSpan.contentEditable = true;
            titleSpan.innerHTML = `${icon} ${displayName}`;
            titleSpan.className += " editable";
        }
        
        titleSpan.onblur = () => {
            const oldName = headers[i];
            const newName = titleSpan.innerText.replace(/[^a-zA-Z\s]/g, '').trim();
            
            if(!newName || oldName === newName) return;
            
            headers[i] = newName;
            
            // rename key in rows
            rows.forEach(r=>{
                r[newName] = r[oldName];
                delete r[oldName];
            });
            
            // rename filter state
            filters[newName] = filters[oldName] || [];
            delete filters[oldName];
            
            buildTable();
        };
        
        headerContent.appendChild(titleSpan);
        
        // disable delete button for subject and cost columns
        if(![0,1].includes(i)){
            const del = document.createElement("button");
            del.innerText = "✕";
            del.className = "delete-col-btn";
            del.title = "Delete column";
            del.onclick = (e) => {
                e.stopPropagation();
                removeColumn(i);
            };
            headerContent.appendChild(del);
        }
        
        th.appendChild(headerContent);
        thead.appendChild(th);
    });
    
    // Actions header (combined)
    const actionsTh = document.createElement("th");
    actionsTh.innerHTML = `<span class="header-title">✨ Actions</span>`;
    actionsTh.className = "actions-header";
    thead.appendChild(actionsTh);
    
    buildFilters();
    renderTable();
}

// ===== FILTER UI =====
function buildFilters(){
    filterBox.innerHTML = "";
    
    headers.slice(1).forEach(col => {
        const dropdown = document.createElement("div");
        dropdown.className = "dropdown";
        
        dropdown.innerHTML = `
            <button class="dropbtn">${getColumnIcon(col)} ${getDisplayName(col)} ▾</button>
            <div class="dropdown-content" id="drop_${col.replace(/\s/g, '_')}"></div>
        `;
        
        filterBox.appendChild(dropdown);
        
        const container = document.getElementById(`drop_${col.replace(/\s/g, '_')}`);
        const unique = [...new Set(rows.map(r => r[col]))];
        
        const all = document.createElement("div");
        all.className = "filter-option";
        all.innerHTML = `
            <label>
                <input type="checkbox"
                    data-col="${col}"
                    data-val="__all__"
                    class="filter-checkbox"
                    checked>
                <span>📋 All</span>
            </label>
        `;
        container.appendChild(all);
        
        unique.forEach(v => {
            const d = document.createElement("div");
            d.className = "filter-option";
            d.innerHTML = `
                <label>
                    <input type="checkbox"
                        data-col="${col}"
                        data-val="${v}"
                        class="filter-checkbox">
                    <span>${v}</span>
                </label>
            `;
            container.appendChild(d);
        });
    });
}

// ===== FILTER LOGIC =====
document.addEventListener("change", e => {
    if(!e.target.classList.contains("filter-checkbox")) return;
    
    const col = e.target.dataset.col;
    const val = e.target.dataset.val;
    
    if(val === "__all__"){
        filters[col] = [];
        document.querySelectorAll(`input[data-col="${col}"]`)
            .forEach(cb => cb.checked = (cb.dataset.val === "__all__"));
    } else {
        document.querySelector(`input[data-col="${col}"][data-val="__all__"]`).checked = false;
        
        if(filters[col].includes(val))
            filters[col] = filters[col].filter(v => v !== val);
        else
            filters[col].push(val);
        
        if(filters[col].length === 0)
            document.querySelector(`input[data-col="${col}"][data-val="__all__"]`).checked = true;
    }
    
    renderTable();
});

// ===== FILTERING =====
function getFiltered(){
    const text = document.getElementById("searchInput").value.toLowerCase();
    
    return rows.filter(r => {
        if(text && !String(r[searchColumn]).toLowerCase().includes(text))
            return false;
        
        for(let c of headers.slice(1)){
            const active = filters[c];
            if(active.length === 0) continue;
            if(!active.includes(r[c])) return false;
        }
        return true;
    });
}

// ===== RENDER =====
function renderTable(){
    tbody.innerHTML = "";
    const data = getFiltered();
    
    if(data.length === 0){
        const tr = document.createElement("tr");
        const td = document.createElement("td");
        td.colSpan = headers.length + 1;
        td.className = "empty-state";
        td.innerHTML = `
            <div class="empty-message">
                <span class="empty-icon">📭</span>
                <p>No data found</p>
                <small>Try adjusting your search or filters</small>
            </div>
        `;
        tr.appendChild(td);
        tbody.appendChild(tr);
        return;
    }
    
    data.forEach((row, filteredIdx) => {
        const tr = document.createElement("tr");
        tr.className = 'data-row';
        tr.style.animationDelay = `${filteredIdx * 0.03}s`;
        
        // Data cells
        headers.forEach(h => {
            const td = document.createElement("td");
            let value = row[h] ?? "";
            
            // Format cost column
            if(h.toLowerCase() === 'cost' && !isNaN(parseFloat(value))) {
                value = formatCurrency(value);
                td.className = 'cell-currency';
            } else if(h.toLowerCase() === 'subject') {
                td.className = 'cell-subject';
            }
            
            td.contentEditable = true;
            td.innerText = value;
            
            td.oninput = () => {
                let newValue = td.innerText;
                if(h.toLowerCase() === 'cost') {
                    newValue = newValue.replace(/[^0-9.-]/g, '');
                }
                row[h] = newValue;
                if(h.toLowerCase() === 'cost') {
                    td.innerText = formatCurrency(newValue);
                }
            };
            
            tr.appendChild(td);
        });
        
        // Combined Actions Cell (Delete + View)
        const actionTd = document.createElement("td");
        actionTd.className = "action-cell combined-actions";
        
        // Delete button
        const delBtn = document.createElement("button");
        delBtn.innerHTML = '<span class="btn-icon">🗑️</span> Delete';
        delBtn.className = "delete-row-btn";
        delBtn.onclick = () => removeRowByObject(row);
        
        // View button
        const viewBtn = document.createElement("button");
        viewBtn.innerHTML = '<span class="btn-icon">🔍</span> View';
        viewBtn.className = "view-btn";
        const firstKey = headers[0];
        const firstValue = row[firstKey];
        viewBtn.onclick = () => {
            const form = document.createElement('form');
            form.method = 'POST';
            form.action = `/factory_parameters/${encodeURIComponent(firstValue)}`;
            form.style.display = 'none';
            
            const idInput = document.createElement('input');
            idInput.type = 'hidden';
            idInput.name = 'id';
            idInput.value = row[headers[0]];
            
            const nameInput = document.createElement('input');
            nameInput.type = 'hidden';
            nameInput.name = headers[0];
            nameInput.value = row[headers[0]] ?? "";
            
            form.appendChild(idInput);
            form.appendChild(nameInput);
            document.body.appendChild(form);
            form.submit();
        };
        
        actionTd.appendChild(delBtn);
        actionTd.appendChild(viewBtn);
        tr.appendChild(actionTd);
        
        tbody.appendChild(tr);
    });
}

// ===== ROW / COLUMN MANAGEMENT =====
function addColumn(){
    const name = prompt("Enter column name:");
    if(!name || name.trim() === "") return;
    
    headers.push(name.trim());
    rows.forEach(r => r[name.trim()] = "");
    filters[name.trim()] = [];
    buildTable();
}

function removeColumn(i){
    const name = headers[i];
    const confirmed = confirm(`Delete column "${getDisplayName(name)}"?`);
    if(!confirmed) return;
    
    headers.splice(i,1);
    rows.forEach(r => delete r[name]);
    delete filters[name];
    buildTable();
}

// Remove row by object reference
function removeRowByObject(rowObj){
    const confirmed = confirm(`Delete row?`);
    if(!confirmed) return;
    const index = rows.findIndex(r => r === rowObj);
    if(index !== -1){
        rows.splice(index, 1);
        renderTable();
    }
}

// ===== MODAL FOR ADD ROW =====
function openAddRowModal(){
    const modal = document.getElementById("addRowModal");
    const container = document.getElementById("modalFieldsContainer");
    if(!container) return;
    
    // Clear and rebuild form fields based on current headers
    container.innerHTML = "";
    
    headers.forEach(header => {
        const fieldDiv = document.createElement("div");
        fieldDiv.className = "form-group";
        
        const label = document.createElement("label");
        label.setAttribute("for", `field_${header.replace(/\s/g, '_')}`);
        label.textContent = `${getColumnIcon(header)} ${getDisplayName(header)}`;
        
        const input = document.createElement("input");
        input.type = "text";
        input.id = `field_${header.replace(/\s/g, '_')}`;
        input.placeholder = `Enter ${getDisplayName(header)}`;
        input.dataset.header = header;
        
        // For cost column, add hint
        if(header.toLowerCase() === 'cost'){
            input.placeholder = "Enter numeric value (e.g., 19.99)";
        }
        
        fieldDiv.appendChild(label);
        fieldDiv.appendChild(input);
        container.appendChild(fieldDiv);
    });
    
    modal.classList.add("active");
    // Focus on first field
    setTimeout(() => {
        const firstInput = container.querySelector("input");
        if(firstInput) firstInput.focus();
    }, 100);
}

function closeAddRowModal(){
    const modal = document.getElementById("addRowModal");
    modal.classList.remove("active");
    document.getElementById("addRowForm").reset();
}

// Handle Add Row Form Submission
document.getElementById("addRowForm").addEventListener("submit", function(e){
    e.preventDefault();
    
    const newRow = {};
    let allFilled = true;
    
    headers.forEach(header => {
        const fieldId = `field_${header.replace(/\s/g, '_')}`;
        const input = document.getElementById(fieldId);
        let value = input ? input.value.trim() : "";
        
        // Basic validation: subject and cost could be required optionally
        if(header.toLowerCase() === 'subject' && value === ""){
            showNotification("Subject field is required.", "error");
            allFilled = false;
            return;
        }
        
        // For cost column, attempt to parse numeric
        if(header.toLowerCase() === 'cost' && value !== ""){
            const numVal = parseFloat(value.replace(/[^0-9.-]/g, ''));
            if(!isNaN(numVal)){
                value = numVal;
            }
        }
        
        newRow[header] = value;
    });
    
    if(!allFilled) return;
    
    rows.push(newRow);
    closeAddRowModal();
    renderTable();
    showNotification("New row added successfully!", "success");
});

// Close modal when clicking outside
document.getElementById("addRowModal").addEventListener("click", function(e){
    if(e.target === this){
        closeAddRowModal();
    }
});

// ===== SAVE FUNCTION =====
function buildColumnData(){
    const data = {};
    headers.forEach(h => {
        data[h] = rows.map(r => {
            const v = r[h];
            if(!isNaN(v) && v !== "") return Number(v);
            return v;
        });
    });
    
    const now = new Date();
    const modificationDate = now.toISOString();
    
    return {
        _order: headers,
        data: data,
        last_modification_date: modificationDate
    };
}

function showNotification(message, type) {
    const notification = document.createElement('div');
    notification.className = `notification ${type}`;
    notification.innerHTML = `
        <span class="notification-icon">${type === 'success' ? '✓' : '⚠'}</span>
        <span>${message}</span>
    `;
    document.body.appendChild(notification);
    setTimeout(() => {
        notification.classList.add('show');
        setTimeout(() => {
            notification.classList.remove('show');
            setTimeout(() => notification.remove(), 300);
        }, 3000);
    }, 100);
}

function saveTable() {
    const confirmed = confirm("Save all changes to the table?");
    if (!confirmed) return;
    
    const payload = buildColumnData();
    payload.saving_file = "subfield";
    
    fetch("/save_factory_subfields", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(async response => {
        const text = await response.text();
        if (!response.ok) throw new Error("Server error: " + response.status);
        try { return JSON.parse(text); } catch { return text; }
    })
    .then(data => {
        showNotification("Table saved successfully!", "success");
    })
    .catch(err => {
        console.error("SAVE ERROR:", err);
        showNotification("Save failed. Check console.", "error");
    });
}

// ===== HOOKS =====
document.getElementById("searchInput").oninput = renderTable;
document.getElementById("addColumnBtn").onclick = addColumn;
document.getElementById("addRowBtn").onclick = openAddRowModal;
document.getElementById("saveBtn").onclick = saveTable;

// Set search placeholder
document.getElementById("searchInput").placeholder = `Search ${getDisplayName(searchColumn)}...`;

// init
buildTable();

</script>
